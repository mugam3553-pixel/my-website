```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:linear-gradient(135deg,#667eea,#764ba2);
            min-height:100vh;
            padding:40px 20px;
        }

        .container{
            max-width:900px;
            margin:auto;
        }

        h2{
            text-align:center;
            color:#fff;
            margin-bottom:30px;
            font-size:36px;
        }

        .order-card{
            background:rgba(255,255,255,0.15);
            backdrop-filter:blur(12px);
            border-radius:15px;
            padding:20px;
            margin-bottom:20px;
            color:#fff;
            box-shadow:0 8px 20px rgba(0,0,0,0.2);
            transition:transform 0.3s ease;
        }

        .order-card:hover{
            transform:translateY(-5px);
        }

        .row{
            display:flex;
            justify-content:space-between;
            align-items:center;
            flex-wrap:wrap;
        }

        .status{
            padding:6px 14px;
            border-radius:20px;
            font-size:14px;
            font-weight:bold;
        }

        .pending{
            background:#f39c12;
        }

        .shipped{
            background:#3498db;
        }

        .delivered{
            background:#2ecc71;
        }

        .total{
            margin-top:15px;
            font-size:22px;
            font-weight:bold;
        }

        .empty{
            text-align:center;
            color:white;
            font-size:20px;
            margin-top:50px;
        }

        @media(max-width:600px){
            .row{
                flex-direction:column;
                align-items:flex-start;
                gap:10px;
            }

            h2{
                font-size:28px;
            }
        }
    </style>
</head>
<body>

<div class="container">

    <h2>📦 My Orders</h2>


        <div class="order-card">

            <div class="row">

                <h3>Order #{{ loop.index }}</h3>

                <span class="status
                    {% if order.status == 'Pending' %}
                        pending
                    {% elif order.status == 'Shipped' %}
                        shipped
                    {% elif order.status == 'Delivered' %}
                        delivered
                    {% else %}
                        pending
                    {% endif %}
                ">
                    {{ order.status }}
                </span>

            </div>

            <div class="total">
                💰 Total: ₹{{ order.total }}
            </div>

        </div>

     

        <div class="empty">
            <h3>No orders found 📭</h3>
            <p>Your orders will appear here after you place one.</p>
        </div>

</div>

</body>
</html>
```
