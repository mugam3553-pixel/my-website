<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Users Management</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:linear-gradient(135deg,#4f46e5,#7c3aed);
            min-height:100vh;
            padding:40px 20px;
        }

        .container{
            max-width:1000px;
            margin:auto;
        }

        .card{
            background:#fff;
            border-radius:15px;
            padding:30px;
            box-shadow:0 10px 25px rgba(0,0,0,0.15);
        }

        h2{
            text-align:center;
            margin-bottom:25px;
            color:#333;
        }

        .search-box{
            margin-bottom:20px;
        }

        .search-box input{
            width:100%;
            padding:12px;
            border:1px solid #ccc;
            border-radius:8px;
            font-size:16px;
        }

        table{
            width:100%;
            border-collapse:collapse;
        }

        th, td{
            padding:14px;
            text-align:left;
            border-bottom:1px solid #e5e5e5;
        }

        th{
            background:#4f46e5;
            color:white;
        }

        tr:hover{
            background:#f7f7f7;
        }

        .role{
            padding:6px 12px;
            border-radius:20px;
            color:white;
            font-size:13px;
            font-weight:bold;
        }

        .admin{
            background:#dc2626;
        }

        .user{
            background:#16a34a;
        }

        .manager{
            background:#2563eb;
        }

        @media(max-width:768px){
            table{
                display:block;
                overflow-x:auto;
            }
        }
    </style>
</head>
<body>

<div class="container">

    <div class="card">

        <h2>👥 User Management</h2>

        <div class="search-box">
            <input
                type="text"
                id="searchInput"
                placeholder="Search by name or email..."
                onkeyup="filterUsers()">
        </div>

        <table id="userTable">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Role</th>
                </tr>
            </thead>

            <tbody>


                <tr>
                    <td>{{ user.name }}</td>

                    <td>{{ user.email }}</td>

                    <td>
                        <span class="role
                            {% if user.role == 'admin' %}
                                admin
                            {% elif user.role == 'manager' %}
                                manager
                            {% else %}
                                user
                            {% endif %}
                        ">
                            
                        </span>
                    </td>
                </tr>

              

            </tbody>
        </table>

    </div>

</div>

<script>
function filterUsers() {
    let input = document.getElementById("searchInput").value.toLowerCase();
    let rows = document.querySelectorAll("#userTable tbody tr");

    rows.forEach(function(row) {
        let text = row.textContent.toLowerCase();

        if (text.includes(input)) {
            row.style.display = "";
        } else {
            row.style.display = "none";
        }
    });
}
</script>

</body>
</html>
