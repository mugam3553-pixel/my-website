<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Orders</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:linear-gradient(135deg,#4f46e5,#7c3aed);
            min-height:100vh;
            padding:30px;
        }

        .container{
            max-width:1200px;
            margin:auto;
        }

        .card{
            background:#fff;
            border-radius:15px;
            padding:30px;
            box-shadow:0 10px 25px rgba(0,0,0,.15);
        }

        h2{
            text-align:center;
            margin-bottom:25px;
            color:#333;
        }

        .search-box{
            margin-bottom:20px;
        }

        .search-box input{
            width:100%;
            padding:12px;
            border:1px solid #ccc;
            border-radius:8px;
            font-size:16px;
        }

        table{
            width:100%;
            border-collapse:collapse;
        }

        th,td{
            padding:14px;
            text-align:left;
            border-bottom:1px solid #e5e5e5;
        }

        th{
            background:#4f46e5;
            color:white;
        }

        tr:hover{
            background:#f8f8f8;
        }

        .status{
            padding:6px 12px;
            border-radius:20px;
            color:white;
            font-size:13px;
            font-weight:bold;
        }

        .pending{
            background:#f59e0b;
        }

        .approved{
            background:#16a34a;
        }

        .rejected{
            background:#dc2626;
        }

        .approve-btn,
        .reject-btn{
            text-decoration:none;
            color:white;
            padding:8px 12px;
            border-radius:6px;
            margin-right:5px;
            display:inline-block;
            transition:.3s;
        }

        .approve-btn{
            background:#16a34a;
        }

        .approve-btn:hover{
            background:#15803d;
        }

        .reject-btn{
            background:#dc2626;
        }

        .reject-btn:hover{
            background:#b91c1c;
        }

        @media(max-width:768px){
            table{
                display:block;
                overflow-x:auto;
            }
        }
    </style>
</head>
<body>

<div class="container">

    <div class="card">

        <h2>📦 Order Management</h2>

        <div class="search-box">
            <input
                type="text"
                id="searchInput"
                placeholder="Search customer or status..."
                onkeyup="filterOrders()">
        </div>

        <table id="ordersTable">

            <thead>
                <tr>
                    <th>#</th>
                    <th>Customer</th>
                    <th>Total</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>

            <tbody>

            {% for order in orders %}

                <tr>

                    <td>{{ loop.index }}</td>

                    <td>{{ order.customer_name }}</td>

                    <td>₹{{ order.total }}</td>

                    <td>
                        <span class="status
                            {% if order.status == 'Approved' %}
                                approved
                            {% elif order.status == 'Rejected' %}
                                rejected
                            {% else %}
                                pending
                            {% endif %}
                        ">
                            {{ order.status }}
                        </span>
                    </td>

                    <td>

                        <a
                            href="/admin/update_order/{{ order._id }}/Approved"
                            class="approve-btn"
                            onclick="return confirm('Approve this order?');">
                            ✔ Approve
                        </a>

                        <a
                            href="/admin/update_order/{{ order._id }}/Rejected"
                            class="reject-btn"
                            onclick="return confirm('Reject this order?');">
                            ✖ Reject
                        </a>

                    </td>

                </tr>

            {% endfor %}

            </tbody>

        </table>

    </div>

</div>

<script>
function filterOrders() {

    let input = document
        .getElementById("searchInput")
        .value
        .toLowerCase();

    let rows = document.querySelectorAll(
        "#ordersTable tbody tr"
    );

    rows.forEach(function(row){

        if(row.textContent.toLowerCase().includes(input)){
            row.style.display = "";
        }
        else{
            row.style.display = "none";
        }

    });

}
</script>

</body>
</html>
