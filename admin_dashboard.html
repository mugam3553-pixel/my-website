```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }

        body{
            background:linear-gradient(135deg,#4f46e5,#7c3aed);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .dashboard{
            width:90%;
            max-width:1000px;
            background:#fff;
            padding:40px;
            border-radius:15px;
            box-shadow:0 10px 25px rgba(0,0,0,.2);
        }

        h1{
            text-align:center;
            margin-bottom:30px;
            color:#333;
        }

        .grid{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
            gap:20px;
        }

        .card{
            text-decoration:none;
            background:#4f46e5;
            color:white;
            padding:30px;
            border-radius:12px;
            text-align:center;
            transition:.3s;
        }

        .card:hover{
            transform:translateY(-5px);
            background:#3730a3;
        }

        .icon{
            font-size:45px;
            margin-bottom:10px;
        }

        h2{
            margin-bottom:8px;
        }

        p{
            font-size:14px;
        }
    </style>
</head>
<body>

<div class="dashboard">

    <h1>🛍️ Admin Dashboard</h1>

    <div class="grid">

        <a href="admin_products.html" class="card">
            <div class="icon">📦</div>
            <h2>Products</h2>
            <p>Manage all products</p>
        </a>

        <a href="add_product.html" class="card">
            <div class="icon">➕</div>
            <h2>Add Product</h2>
            <p>Create a new product</p>
        </a>

        <a href="admin_users.html" class="card">
            <div class="icon">👥</div>
            <h2>Users</h2>
            <p>View registered users</p>
        </a>

        <a href="admin_orders.html" class="card">
            <div class="icon">🛒</div>
            <h2>Orders</h2>
            <p>Manage customer orders</p>
        </a>

    </div>

</div>

</body>
</html>
```
