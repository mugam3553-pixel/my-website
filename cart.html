```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:linear-gradient(135deg,#4f46e5,#7c3aed);
            min-height:100vh;
            padding:40px 20px;
        }

        .container{
            max-width:900px;
            margin:auto;
        }

        .cart-box{
            background:#fff;
            border-radius:15px;
            padding:30px;
            box-shadow:0 10px 25px rgba(0,0,0,0.15);
        }

        h2{
            text-align:center;
            margin-bottom:25px;
            color:#333;
        }

        .cart-item{
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:15px 0;
            border-bottom:1px solid #e5e5e5;
        }

        .product-name{
            font-size:18px;
            font-weight:bold;
            color:#444;
        }

        .product-price{
            font-size:18px;
            color:#16a34a;
            font-weight:bold;
        }

        .summary{
            margin-top:25px;
            display:flex;
            justify-content:space-between;
            font-size:24px;
            font-weight:bold;
            border-top:2px solid #ddd;
            padding-top:20px;
        }

        .checkout-btn{
            display:block;
            width:100%;
            margin-top:25px;
            padding:15px;
            text-align:center;
            text-decoration:none;
            background:#16a34a;
            color:white;
            font-size:18px;
            border-radius:10px;
            transition:0.3s;
        }

        .checkout-btn:hover{
            background:#15803d;
        }

        .continue-btn{
            display:block;
            width:100%;
            margin-top:15px;
            padding:15px;
            text-align:center;
            text-decoration:none;
            background:#2563eb;
            color:white;
            font-size:18px;
            border-radius:10px;
            transition:0.3s;
        }

        .continue-btn:hover{
            background:#1d4ed8;
        }

        .empty-cart{
            text-align:center;
            padding:40px;
            color:#666;
        }

        @media(max-width:600px){
            .cart-item{
                flex-direction:column;
                align-items:flex-start;
                gap:8px;
            }

            .summary{
                flex-direction:column;
                gap:10px;
            }
        }
    </style>
</head>
<body>

<div class="container">

    <div class="cart-box">

        <h2>🛒 Your Shopping Cart</h2>

  

            <div class="cart-item">
                <div class="product-name">
                    {{ item.name }}
                </div>

                <div class="product-price">
                    ₹{{ item.price }}
                </div>
            </div>

      

            <div class="summary">
                <span>Total</span>
                <span>₹{{ total }}</span>
            </div>

            <a href="checkout.html" class="checkout-btn">
                ✅ Proceed to Checkout
            </a>

            <a href="product.html" class="continue-btn">
                🛍️ Continue Shopping
            </a>


            <div class="empty-cart">
                <h3>Your cart is empty 🛒</h3>
                <p>Add some products to get started.</p>

                <a href="/" class="continue-btn">
                    Browse Products
                </a>
            </div>


    </div>

</div>

</body>
</html>
```
