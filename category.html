
<!DOCTYPE html>

<meta charset="UTF-8">

<title>ShopBy - E-Commerce</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f5f5f5;
}

header{
    background:#2563eb;
    color:white;
    padding:15px 30px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
}

.controls{
    display:flex;
    gap:10px;
    padding:20px;
    flex-wrap:wrap;
}

input,select{
    padding:10px;
    border-radius:8px;
    border:1px solid #ccc;
}

#products{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    padding:20px;
}

.card{
    background:white;
    border-radius:12px;
    overflow:hidden;
    transition:.3s;
    box-shadow:0 5px 15px rgba(0,0,0,.1);
}

.card:hover{
    transform:translateY(-8px);
    box-shadow:0 12px 25px rgba(0,0,0,.2);
}

.card img{
    width:100%;
    height:220px;
    object-fit:cover;
}

.info{
    padding:15px;
}

.price{
    color:green;
    font-size:22px;
    font-weight:bold;
    margin:8px 0;
}

.old{
    color:#888;
    text-decoration:line-through;
    font-size:14px;
}

button{
    width:100%;
    margin-top:8px;
    padding:10px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.cart{
    background:#16a34a;
    color:white;
}

.wish{
    background:#e11d48;
    color:white;
}
</style>

</head>

let cart =
JSON.parse(localStorage.getItem("cart")) || [];

let wishlist =
JSON.parse(localStorage.getItem("wishlist")) || [];

function updateCounts(){

document.getElementById("cartCount").textContent =
cart.length;

document.getElementById("wishCount").textContent =
wishlist.length;

}

function addCart(id){

const product =
products.find(p=>p.id===id);

cart.push(product);

localStorage.setItem(
"cart",
JSON.stringify(cart)
);

updateCounts();

alert("Added to Cart");

}

function addWish(id){

const product =
products.find(p=>p.id===id);

wishlist.push(product);

localStorage.setItem(
"wishlist",
JSON.stringify(wishlist)
);

updateCounts();

alert("Added to Wishlist");

}

function render(){

let list=[...products];

const search =
document
.getElementById("search")
.value
.toLowerCase();

list =
list.filter(
p=>p.name
.toLowerCase()
.includes(search)
);

const sort =
document
.getElementById("sort")
.value;

if(sort==="low"){

list.sort(
(a,b)=>a.price-b.price
);

}

if(sort==="high"){

list.sort(
(a,b)=>b.price-a.price
);

}

document.getElementById("products").innerHTML =
list.map(p=>`

<div class="card">

<img src="${p.image}">

<div class="info">

<h3>${p.name}</h3>

<div class="price">
₹${p.price}
<span class="old">
₹${p.old}
</span>
</div>

<button
class="cart"
onclick="addCart(${p.id})">
🛒 Add to Cart
</button>

<button
class="wish"
onclick="addWish(${p.id})">
❤️ Wishlist
</button>

</div>

</div>

`).join("");

}

document
.getElementById("search")
.addEventListener(
"input",
render
);

document
.getElementById("sort")
.addEventListener(
"change",
render
);

updateCounts();
render();

</script>
