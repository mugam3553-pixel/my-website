```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Product</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:linear-gradient(135deg,#4f46e5,#7c3aed);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:20px;
        }

        .card{
            width:100%;
            max-width:600px;
            background:#fff;
            padding:30px;
            border-radius:15px;
            box-shadow:0 10px 25px rgba(0,0,0,0.2);
        }

        h2{
            text-align:center;
            margin-bottom:25px;
            color:#333;
        }

        .form-group{
            margin-bottom:18px;
        }

        label{
            display:block;
            margin-bottom:6px;
            font-weight:bold;
            color:#444;
        }

        input,
        textarea{
            width:100%;
            padding:12px;
            border:1px solid #ccc;
            border-radius:8px;
            font-size:15px;
            outline:none;
        }

        textarea{
            resize:vertical;
            min-height:120px;
        }

        input:focus,
        textarea:focus{
            border-color:#4f46e5;
        }

        #preview{
            display:none;
            width:180px;
            height:180px;
            object-fit:cover;
            border-radius:10px;
            margin:15px auto;
            border:1px solid #ddd;
        }

        .btn{
            width:100%;
            padding:14px;
            background:#16a34a;
            color:#fff;
            border:none;
            border-radius:8px;
            font-size:16px;
            cursor:pointer;
            transition:0.3s;
        }

        .btn:hover{
            background:#15803d;
        }

        .back{
            display:block;
            text-align:center;
            margin-top:15px;
            text-decoration:none;
            color:#4f46e5;
            font-weight:bold;
        }
    </style>
</head>
<body>

<div class="card">

    <h2>📦 Add New Product</h2>

    <form method="POST">

        <div class="form-group">
            <label>Product Name</label>
            <input
                type="text"
                name="name"
                placeholder="Enter product name"
                required>
        </div>

        <div class="form-group">
            <label>Price (₹)</label>
            <input
                type="number"
                name="price"
                min="0"
                step="0.01"
                placeholder="Enter price"
                required>
        </div>

        <div class="form-group">
            <label>Image URL</label>
            <input
                type="url"
                id="image"
                name="image"
                placeholder="https://example.com/image.jpg"
                oninput="previewImage()">
        </div>

        <img id="preview" alt="Image Preview">

        <div class="form-group">
            <label>Description</label>
            <textarea
                name="description"
                placeholder="Enter product description"></textarea>
        </div>

        <button type="submit" class="btn">
            ➕ Add Product
        </button>

    </form>

    <a href="templates\admin_products.html" class="back">
        ← Back to Products
    </a>

</div>

<script>
function previewImage() {
    const url = document.getElementById("image").value;
    const preview = document.getElementById("preview");

    if (url.trim() !== "") {
        preview.src = url;
        preview.style.display = "block";
    } else {
        preview.style.display = "none";
    }
}
</script>

</body>
</html>
